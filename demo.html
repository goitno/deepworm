<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>deepworm Demo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
    font-family: 'JetBrains Mono', 'SF Mono', monospace;
    overflow: hidden;
  }
  .terminal-wrapper { width: 900px; max-width: 95vw; }
  .terminal {
    background: #1e1e2e; border-radius: 12px; overflow: hidden;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.05), 0 25px 60px rgba(0,0,0,0.5), 0 0 120px rgba(137,180,250,0.08);
  }
  .titlebar {
    background: #181825; padding: 10px 14px;
    display: flex; align-items: center; gap: 8px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .dot { width: 12px; height: 12px; border-radius: 50%; }
  .dot-red { background: #f38ba8; }
  .dot-yellow { background: #f9e2af; }
  .dot-green { background: #a6e3a1; }
  .titlebar-text { flex:1; text-align:center; color:#6c7086; font-size:11px; margin-right:44px; }
  .terminal-body { padding: 12px 16px; height: 440px; overflow-y: hidden; position: relative; }
  .lines-container { transition: transform 0.12s ease-out; }
  .line {
    min-height: 20px; line-height: 20px; font-size: 12.5px;
    color: #cdd6f4; white-space: pre;
    opacity: 0; transform: translateY(3px);
    transition: opacity 0.15s ease, transform 0.15s ease;
  }
  .line.visible { opacity: 1; transform: translateY(0); }
  .line.typing .cursor {
    display: inline-block; width: 7px; height: 14px;
    background: #89b4fa; animation: blink 0.8s step-end infinite;
    vertical-align: text-bottom; margin-left: 1px;
  }
  @keyframes blink { 50% { opacity: 0; } }
  .c-green { color: #a6e3a1; } .c-blue { color: #89b4fa; }
  .c-cyan { color: #94e2d5; } .c-yellow { color: #f9e2af; }
  .c-red { color: #f38ba8; } .c-pink { color: #f5c2e7; }
  .c-dim { color: #6c7086; } .c-bold { font-weight: 700; }
  .c-white { color: #cdd6f4; } .c-mauve { color: #cba6f7; }
  .c-peach { color: #fab387; } .c-teal { color: #94e2d5; }
  .prompt { color: #89b4fa; font-weight: 700; }
  .intro-overlay {
    position: fixed; top:0; left:0; right:0; bottom:0;
    background: #1a1a2e; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 100; transition: opacity 0.6s ease;
  }
  .intro-overlay.hidden { opacity: 0; pointer-events: none; }
  .intro-title { font-size: 42px; font-weight: 700; color: #cdd6f4; margin-bottom: 6px; }
  .intro-subtitle { font-size: 14px; color: #6c7086; }
  .intro-emoji { font-size: 56px; margin-bottom: 12px; animation: bounce 1.5s ease-in-out infinite; }
  @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
</style>
</head>
<body>
<div class="intro-overlay" id="intro">
  <div class="intro-emoji">🐁</div>
  <div class="intro-title">deepworm</div>
  <div class="intro-subtitle">AI-powered deep research from your terminal</div>
</div>
<div class="terminal-wrapper" id="termWrapper">
  <div class="terminal">
    <div class="titlebar">
      <div class="dot dot-red"></div>
      <div class="dot dot-yellow"></div>
      <div class="dot dot-green"></div>
      <div class="titlebar-text">deepworm — zsh</div>
    </div>
    <div class="terminal-body" id="termBody">
      <div class="lines-container" id="linesContainer"></div>
    </div>
  </div>
</div>
<script>
const container = document.getElementById('linesContainer');
const LINE_HEIGHT = 20;
const VISIBLE_LINES = Math.floor(440 / LINE_HEIGHT);

function makeLine(html='') {
  const div = document.createElement('div');
  div.className = 'line';
  div.innerHTML = html;
  container.appendChild(div);
  requestAnimationFrame(() => div.classList.add('visible'));
  const n = container.children.length;
  if (n > VISIBLE_LINES)
    container.style.transform = `translateY(-${(n - VISIBLE_LINES) * LINE_HEIGHT}px)`;
  return div;
}
const wait = ms => new Promise(r => setTimeout(r, ms));

async function typeText(el, text, speed=20) {
  el.classList.add('typing');
  let cur = el.getAttribute('data-prefix') || '';
  for (let i = 0; i < text.length; i++) {
    cur += text[i];
    el.innerHTML = cur + '<span class="cursor"></span>';
    await wait(speed + Math.random() * 8);
  }
  el.classList.remove('typing');
  el.innerHTML = cur;
}
async function typePrompt(text, speed=20) {
  const l = makeLine('');
  l.setAttribute('data-prefix', '<span class="prompt">❯ </span>');
  l.innerHTML = '<span class="prompt">❯ </span>';
  await wait(150);
  await typeText(l, text, speed);
}
async function out(html, delay=40) { makeLine(html); await wait(delay); }

async function runDemo() {
  await wait(1500);
  document.getElementById('intro').classList.add('hidden');
  await wait(500);

  // Install
  await typePrompt('pip install deepworm', 18);
  await wait(100);
  await out('<span class="c-green">Successfully installed deepworm-1.5.0</span>', 400);

  // Key
  await typePrompt('export GOOGLE_API_KEY="AIza..."', 18);
  await wait(400);

  // Interactive
  await typePrompt('deepworm interactive', 18);
  await wait(200);
  await out('');
  await out('<span class="c-blue c-bold">deepworm 🐁 v1.5.0</span>  │  <span class="c-cyan">gemini-2.5-flash-lite</span>  │  <span class="c-dim">depth:1 breadth:1</span>', 60);
  await out('<span class="c-dim">──────────────────────────────────────────────────────</span>', 60);
  await out('  <span class="c-blue c-bold">↑ Research</span>      <span class="c-dim">/keys  /models  /set  /graph  /polish</span>', 40);
  await out('', 30);

  // Query
  const ql = makeLine('');
  ql.setAttribute('data-prefix', '<span class="c-mauve c-bold">⟫ </span>');
  ql.innerHTML = '<span class="c-mauve c-bold">⟫ </span>';
  await wait(200);
  await typeText(ql, 'quantum computing 2025 --polish --graph stats', 18);
  await wait(200);
  await out('');

  // Searches
  await out('<span class="c-yellow">🔍</span> Generating search queries...', 300);
  await out('<span class="c-yellow">🔍</span> <span class="c-dim">[1/3]</span> quantum computing breakthroughs 2025', 150);
  await out('<span class="c-yellow">🔍</span> <span class="c-dim">[2/3]</span> quantum error correction advances', 150);
  await out('<span class="c-yellow">🔍</span> <span class="c-dim">[3/3]</span> quantum practical applications 2025', 200);
  await out('');

  // Pages
  const pages = [
    ['nature.com/quantum-2025','15,230'],['arxiv.org/abs/2501.08342','12,870'],
    ['technologyreview.com/quantum','9,450'],['research.ibm.com/quantum','11,200'],
    ['blog.google/quantum-willow','8,930'],['microsoft.com/azure-quantum','7,650'],
    ['science.org/quantum-error','6,890'],['wired.com/quantum-2025','5,430'],
  ];
  for (let i = 0; i < pages.length; i++)
    await out(`<span class="c-cyan">📄</span> <span class="c-dim">[${i+1}]</span> <span class="c-teal">${pages[i][0]}</span> <span class="c-dim">(${pages[i][1]} chars)</span>`, 80);
  await out('');

  // Analysis
  const findings = [
    ['nature.com','Google Willow achieves below-threshold error correction...'],
    ['arxiv.org','Topological qubits show 99.9% gate fidelity...'],
    ['technologyreview.com','IBM 1000+ qubit Condor marks commercial milestone...'],
    ['research.ibm.com','Quantum advantage for drug discovery simulations...'],
    ['blog.google','Random circuit sampling solved in 5 min vs 10²⁵ years...'],
  ];
  for (const f of findings)
    await out(`<span class="c-peach">⏳</span> ${f[0]}  <span class="c-green">✓</span> <span class="c-dim">"${f[1]}"</span>`, 120);
  await out('<span class="c-dim">  ...and 3 more sources</span>', 80);
  await out('');
  await out('<span class="c-pink">✍</span> <span class="c-bold">Synthesizing report from 8 sources...</span>', 500);
  await out('');

  // Report
  await out('<span class="c-blue c-bold"># Quantum Computing Breakthroughs in 2025</span>', 60);
  await out('');
  await out('<span class="c-blue c-bold">## Overview</span>', 40);
  await out('2025 marked a pivotal turning point in quantum computing', 20);
  await out('with breakthroughs in error correction and qubit fidelity.', 20);
  await out('');
  await out('<span class="c-bold">### 1. Below-Threshold Error Correction</span>', 40);
  await out('Google Willow chip: error rates decrease exponentially [1][2].', 20);
  await out('');
  await out('<span class="c-bold">### 2. 1000+ Qubit Processors</span>', 40);
  await out('IBM Condor surpassed 1,121 qubits [3].', 20);
  await out('');
  await out('<span class="c-bold">### 3. Practical Quantum Advantage</span>', 40);
  await out('First quantum advantage in drug discovery simulations [4][5].', 20);
  await out('');

  // Done
  await out('<span class="c-dim">─────────────────────────────────────────────────</span>', 40);
  await out('<span class="c-green c-bold">✅ Done</span> · <span class="c-cyan">8 sources</span> · <span class="c-yellow">38.2s</span> · <span class="c-peach">15,840 tokens</span>', 200);
  await out('<span class="c-dim">📄 Auto-saved: ~/.deepworm/reports/quantum_computing_2025.md</span>', 150);
  await out('');

  // Polish
  await out('<span class="c-dim">━━━━━━━━━━━━━ </span><span class="c-blue c-bold">Polish Pipeline</span><span class="c-dim"> ━━━━━━━━━━━━━</span>', 50);
  await out('  <span class="c-bold">1.</span> Readability  <span class="c-cyan">Grade 12</span> <span class="c-dim">(college)</span>    <span class="c-bold">2.</span> Compliance  <span class="c-green">✓ 5/5</span>    <span class="c-bold">3.</span> Quality  <span class="c-green c-bold">A</span> <span class="c-dim">(91%)</span>', 200);
  await out('     <span class="c-dim">Structure</span> <span class="c-green">████████████████████</span> <span class="c-dim">95%</span>   <span class="c-dim">Depth</span> <span class="c-green">██████████████████░░</span> <span class="c-dim">88%</span>', 80);
  await out('     <span class="c-dim">Sources</span>   <span class="c-green">███████████████████░</span> <span class="c-dim">92%</span>   <span class="c-dim">Read.</span> <span class="c-green">██████████████████░░</span> <span class="c-dim">90%</span>', 80);
  await out('');

  // Graph
  await out('<span class="c-dim">━━━━━━━━━━━━━ </span><span class="c-blue c-bold">Knowledge Graph</span><span class="c-dim"> ━━━━━━━━━━━━━</span>', 50);
  await out('  <span class="c-bold">Nodes</span> 18   <span class="c-bold">Edges</span> 29   <span class="c-bold">Density</span> 0.189', 80);
  await out('  <span class="c-cyan">Quantum Computing </span> <span class="c-dim">concept</span>  <span class="c-green">████████</span> 8    <span class="c-cyan">Error Correction</span> <span class="c-dim">concept</span>  <span class="c-green">██████</span> 6', 80);
  await out('  <span class="c-cyan">Google Willow     </span> <span class="c-dim">entity </span>  <span class="c-green">█████</span> 5    <span class="c-cyan">IBM Condor      </span> <span class="c-dim">entity </span>  <span class="c-green">████</span> 4', 80);
  await out('');

  // End
  const el = makeLine('');
  el.setAttribute('data-prefix', '<span class="c-mauve c-bold">⟫ </span>');
  el.innerHTML = '<span class="c-mauve c-bold">⟫ </span><span class="cursor"></span>';
  el.classList.add('typing');
  await wait(1500);
  await out('');
  await out('<span class="c-dim">  pip install deepworm  ·  github.com/bysiber/deepworm</span>');
  await wait(2500);
}
runDemo();
</script>
</body>
</html>
